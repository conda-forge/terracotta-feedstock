schema_version: 1

context:
  name: terracotta
  version: "0.10.1"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  sha256: e5d2ac9b78a36d0f28414b1a4890c961dede50d1f9ce33b8d23eee643f5e2348

build:
  number: 1
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - terracotta = terracotta.scripts.cli:entrypoint

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools <81
    - setuptools-scm <8
    - setuptools_scm_git_archive
    - numpy >=1.15,!=1.17.0,<2
    - pip
  run:
    - python >=${{ python_min }}
    - apispec >=1.0
    - apispec-webframeworks
    - cachetools >=3.1.0
    - click
    - click-spinner
    - flask
    - flask-cors
    - marshmallow >=3.0.0
    - mercantile
    - numpy >=1.15,!=1.17.0,<2
    - pillow
    - pyyaml >=3.10
    - shapely
    - rasterio >=1.3.0
    - setuptools <81
    - sqlalchemy >=1.4.1
    - toml
    - tqdm

tests:
  - python:
      imports:
        - terracotta
        - terracotta.client
        - terracotta.cmaps
        - terracotta.drivers
        - terracotta.handlers
        - terracotta.scripts
        - terracotta.server
      pip_check: false
      python_version: ${{ python_min }}
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      - terracotta --help

about:
  license: MIT
  license_file: LICENSE
  summary: A modern XYZ tile server written in Python
  description: Terracotta is a pure Python tile server that runs as a WSGI app on a dedicated webserver or as a serverless app on AWS Lambda. It is built on a modern Python 3.6 stack, powered by awesome open-source software such as Flask, Zappa, and Rasterio.
  homepage: https://github.com/DHI-GRAS/terracotta
  repository: https://github.com/DHI-GRAS/terracotta
  documentation: https://pypi.org/project/terracotta/#description

extra:
  recipe-maintainers:
    - mxr-conda
    - bubblyorca
    - jan-janssen
